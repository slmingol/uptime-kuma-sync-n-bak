version: '3.8'

services:
  # One-shot sync/backup/diff/restore — override command as needed
  uptime-kuma-sync:
    image: ghcr.io/slmingol/uptime-kuma-sync-n-bak:latest
    container_name: uptime-kuma-sync
    volumes:
      - ../uptime-kuma-config.json:/app/uptime-kuma-config.json:ro
      - ../uptime-kuma-backups:/app/uptime-kuma-backups
    # Example commands:
    # command: node src/uptime-kuma-sync.js primary secondary
    # command: node src/uptime-kuma-backup.js primary
    # command: node src/uptime-kuma-diff.js primary secondary --tldr

  # Sync daemon — runs sync on a schedule and serves a status UI on port 8089
  # Use `make daemon` to start — it pre-creates state files on the host so Docker
  # mounts them as files rather than directories.
  uptime-kuma-sync-daemon:
    image: ghcr.io/slmingol/uptime-kuma-sync-n-bak:latest
    container_name: uptime-kuma-sync-daemon
    command: node src/uptime-kuma-daemon.js
    ports:
      - "${DAEMON_PORT:-8089}:8089"
    volumes:
      - ../uptime-kuma-config.json:/app/uptime-kuma-config.json:ro
      - ../uptime-kuma-backups:/app/uptime-kuma-backups
      - ../uptime-kuma-sync-history.json:/app/.uptime-kuma-sync-history.json
      - ../.uptime-kuma-sync-state.json:/app/.uptime-kuma-sync-state.json
    environment:
      SYNC_SOURCE:   ${SYNC_SOURCE:-primary}
      SYNC_TARGET:   ${SYNC_TARGET:-secondary}
      SYNC_INTERVAL: ${SYNC_INTERVAL:-3600}
      SYNC_MODE:     ${SYNC_MODE:-shallow}
      DAEMON_PORT:   8089
    restart: unless-stopped

  # Standalone scheduled backup (optional, separate from daemon)
  uptime-kuma-backup-cron:
    image: ghcr.io/slmingol/uptime-kuma-sync-n-bak:latest
    container_name: uptime-kuma-backup-cron
    volumes:
      - ../uptime-kuma-config.json:/app/uptime-kuma-config.json:ro
      - ../uptime-kuma-backups:/app/uptime-kuma-backups
    restart: unless-stopped
    entrypoint: /bin/sh
    command: -c "while true; do node src/uptime-kuma-backup.js primary; sleep 21600; done"
