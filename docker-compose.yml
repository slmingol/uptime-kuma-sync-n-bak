version: '3.8'

services:
  uptime-kuma-sync:
    build: .
    image: uptime-kuma-sync:latest
    container_name: uptime-kuma-sync
    volumes:
      # Mount config file (create local config first)
      - ./uptime-kuma-config.json:/app/uptime-kuma-config.json:ro
      # Mount backup directory
      - ./uptime-kuma-backups:/app/uptime-kuma-backups
    # Override command - examples below
    # command: node uptime-kuma-backup.js primary
    # command: node uptime-kuma-sync.js primary secondary
    # command: node uptime-kuma-restore.js /app/uptime-kuma-backups/primary-2026-03-01.json secondary

  # For scheduled backups (optional)
  uptime-kuma-backup-cron:
    build: .
    image: uptime-kuma-sync:latest
    container_name: uptime-kuma-backup-cron
    volumes:
      - ./uptime-kuma-config.json:/app/uptime-kuma-config.json:ro
      - ./uptime-kuma-backups:/app/uptime-kuma-backups
    restart: unless-stopped
    # This runs a backup every 6 hours
    # Customize the schedule and instance name as needed
    entrypoint: /bin/sh
    command: -c "while true; do node uptime-kuma-backup.js primary; sleep 21600; done"
